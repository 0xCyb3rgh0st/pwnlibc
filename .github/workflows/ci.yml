name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: go vet + go test (in container)
        run: docker compose run --rm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: golangci-lint (in container)
        id: lint
        run: |
          set -o pipefail
          docker compose run --rm lint 2>&1 | tee lint-output.log
      - name: Surface failure output as an annotation
        if: failure() && steps.lint.outcome == 'failure'
        run: |
          # The GitHub Actions log viewer is JS-rendered and the raw-log API
          # needs auth, both unreachable for quick diagnosis -- but check-run
          # annotations ARE readable via the public API, so mirror the
          # tail of the output there as a fallback diagnostic channel.
          tail -c 3000 lint-output.log | while IFS= read -r line; do
            echo "::error::${line}"
          done
      - name: Upload lint output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.log
          retention-days: 7

  build-and-scan:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        run: docker compose build cli
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pwnlibc:latest
          severity: HIGH,CRITICAL
          exit-code: "1"

  release-images:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-and-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # OCI/Docker repository names must be all-lowercase; github.repository
      # preserves the actual repo casing (0xCyb3rgh0st/pwnlibc), which
      # buildx rejects outright ("repository name must be lowercase").
      # There's no built-in lowercase function in Actions expressions, so
      # compute it in a shell step instead.
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-and-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # GoReleaser needs a Go toolchain to cross-compile; this runs only in
      # CI infrastructure, not on a contributor's or user's machine, so it
      # doesn't conflict with the project's "no local Go needed" goal.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
